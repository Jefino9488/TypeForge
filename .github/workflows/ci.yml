name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v7
    
    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
      
    - name: Run Tests
      run: cargo test --all-features

  clippy:
    name: Clippy Lints
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v7
    
    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy
        
    - name: Run Clippy
      run: cargo clippy -- -D warnings

  build-cpp:
    name: Build Fcitx5 Adapter
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v7
    
    - name: Install dependencies
      run: sudo apt-get update && sudo apt-get install -y cmake extra-cmake-modules libfcitx5core-dev libfcitx5utils-dev gettext
      
    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
      
    - name: Build Rust Bridge
      run: cargo build --release -p typeforge-fcitx5-bridge
      
    - name: Configure CMake
      run: mkdir -p adapters/fcitx5/build && cd adapters/fcitx5/build && cmake -DCMAKE_INSTALL_PREFIX=/usr ../cpp
      
    - name: Build Adapter
      run: cd adapters/fcitx5/build && make
