name: Benchmark

on:
  pull_request:
    branches: [ main ]

jobs:
  bench:
    name: Run Benchmarks
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
      
    - name: Run Cargo Bench
      run: cargo bench
